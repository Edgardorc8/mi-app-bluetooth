name: Compilar APK de Kivy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev \
            wget \
            build-essential

      - name: Instalar Cython y Buildozer
        run: |
          pip install --user --upgrade pip
          pip install --user cython==0.29.33 buildozer

      - name: Agregar ~/.local/bin al PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache de dependencias de Buildozer (Android SDK/NDK)
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Aceptar licencias de Android automáticamente
        run: |
          # Crear el directorio de licencias si no existe
          mkdir -p ~/.android
          # Aceptar todas las licencias (esto evita que Buildozer pregunte)
          yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          # Si ANDROID_HOME no está definido, lo definimos
          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
          yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses > /dev/null 2>&1 || true
        continue-on-error: true

      - name: Compilar APK con Buildozer (aceptando todo automáticamente)
        run: |
          # Forzar la aceptación de cualquier pregunta con "yes"
          yes | buildozer android debug

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Bluetooth-Directo-APK
          path: bin/*.apk
